<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Director+ 2026 | Digital Hub</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111111;
  --muted:#6a6a6a;
  --accent:#c8102e;
  --border:#e6e6e6;
  --card:#fafafa;
  --button:#111111;
  --buttonText:#ffffff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:72px 22px 84px;
  text-align:center;
}

.kicker{
  font-size:12px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:18px;
}

h1{
  font-size:32px;
  margin:0;
  font-weight:650;
  letter-spacing:-0.03em;
}

.sub{
  margin-top:10px;
  font-size:15px;
  color:var(--muted);
}

.card{
  margin-top:42px;
  padding:30px 24px;
  border-radius:18px;
  border:1px solid var(--border);
  background:var(--card);
}

.btn{
  display:block;
  width:100%;
  padding:16px;
  margin:14px 0;
  border-radius:14px;
  text-decoration:none;
  font-weight:650;
  font-size:15px;
  transition:all .18s ease;
}

.btn.primary{
  background:var(--button);
  color:var(--buttonText);
}

.btn.primary:hover{
  background:#000;
  transform:translateY(-1px);
}

.btn.secondary{
  background:#fff;
  border:1px solid var(--border);
  color:var(--text);
}

.btn.secondary:hover{
  border-color:var(--accent);
  color:var(--accent);
  transform:translateY(-1px);
}

.divider{
  height:1px;
  background:var(--border);
  margin:24px 0;
}

.footer{
  margin-top:24px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>
  <div class="container">

    <div class="kicker">VASA Fitness</div>
    <h1>Director+ 2026</h1>
    <div class="sub">Digital Hub</div>

    <div class="card">

   href="https://vasafitness-my.sharepoint.com/:b:/p/chris_griebe/IQBeRHsUec0NSYd-vJqCgXAVAcnBIEhv5LSLHHRP1FXIgug?e=nV65wE"
   target="_blank" rel="noopener">
   View Agenda (PDF)
</a>

      <a class="btn primary"

         target="_blank" rel="noopener">
         Session Materials
      </a>

      <div class="divider"></div>

      <!-- Engagement -->

      <!-- Engagement -->

<a class="btn secondary"
   href="PASTE_FEEDBACK_FORM_LINK_HERE"

   Submit Feedback
</a>

<a class="btn secondary"

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Director+ 2026 | Digital Hub</title>

<style>
:root {
  --bg: #ffffff;
  --text: #111111;
  --muted: #6a6a6a;
  --accent: #c8102e; /* Subtle VASA red */
  --button: #111111;
  --buttonText: #ffffff;
  --border: #e6e6e6;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 60px 22px 70px;
  text-align: center;
}

.kicker {
  font-size: 12px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
}

h1 {
  font-size: 30px;
  margin: 0;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.sub {
  margin-top: 6px;
  font-size: 15px;
  color: var(--muted);
}

.card {
  margin-top: 40px;
  padding: 28px 24px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: #fafafa;
}

.btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin: 14px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  transition: all .2s ease;
}

.btn.primary {
  background: var(--button);
  color: var(--buttonText);
}

.btn.primary:hover {
  background: #000000;
  transform: translateY(-1px);
}

.btn.secondary {
  background: #ffffff;
  border: 1px solid var(--border);
  color: var(--text);
}

.btn.secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
}

.note {
  margin-top: 22px;
  font-size: 12px;
  color: var(--muted);
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 22px 0;
}
</style>
</head>

<body>
  <div class="container">
    <div class="kicker">VASA Fitness</div>
    <h1>Director+ 2026</h1>
    <div class="sub">Digital Hub</div>

    <div class="card">
      <a class="btn primary" 
         href="https://vasafitness-my.sharepoint.com/:b:/p/chris_griebe/IQBeRHsUec0NSYd-vJqCgXAVAcnBIEhv5LSLHHRP1FXIgug?e=NVl4Bd" 
         target="_blank" rel="noopener">
         View Agenda (PDF)
      </a>

      <a class="btn primary" 
         href="https://vasafitness-my.sharepoint.com/:f:/p/chris_griebe/IgAxk_FwV_sTR7XpuQ3bGv1sAcvYnJ_WO2KI3mIvIeE49G8?e=hlP7kI" 
         target="_blank" rel="noopener">
         Session Materials
      </a>

      <div class="divider"></div>

      <a class="btn secondary" 
         href="PASTE_FEEDBACK_FORM_LINK" 
         target="_blank" rel="noopener">
         Submit Feedback
      </a>

      <a class="btn secondary" 
         href="PASTE_COMMITMENT_FORM_LINK" 
         target="_blank" rel="noopener">
         Leadership Commitment
      </a>

      <div class="note">
        Some links may require VASA sign-in.
      </div>
    </div>
  </div>
</body>
</html>

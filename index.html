<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Director+ 2026 | Digital Hub</title>
  <style>
    :root { --bg:#ffffff; --text:#111111; --muted:#5a5a5a; --btn:#111111; --btnText:#ffffff; --card:#f5f5f5; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 520px; margin: 0 auto; padding: 40px 18px 56px; }
    .top { text-align:center; margin-bottom: 28px; }
    .kicker { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    h1 { margin: 10px 0 6px; font-size: 28px; }
    .sub { margin: 0; color: var(--muted); font-size: 14px; }
    .card { background: var(--card); border-radius: 14px; padding: 16px; margin-top: 22px; }
    .btn { display:block; width:100%; box-sizing:border-box; padding: 14px 16px; margin: 12px 0; border-radius: 12px;
           background: var(--btn); color: var(--btnText); text-decoration:none; font-weight: 600; text-align:center; }
    .btn.secondary { background:#ffffff; color: var(--text); border: 1px solid #e1e1e1; }
    .note { font-size: 12px; color: var(--muted); line-height: 1.4; margin-top: 14px; text-align:center; }
    .divider { height: 1px; background:#e6e6e6; margin: 16px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="kicker">VASA Fitness</div>
      <h1>Director+ 2026</h1>
      <p class="sub">Digital Hub</p>
    </div>

    <div class="card">
      <a class="btn" href="PASTE_AGENDA_PDF_LINK_HERE" target="_blank" rel="noopener">View Agenda (PDF)</a>
      <a class="btn" href="PASTE_SESSION_MATERIALS_LINK_HERE" target="_blank" rel="noopener">Session Materials</a>
      <a class="btn secondary" href="PASTE_FEEDBACK_FORM_LINK_HERE" target="_blank" rel="noopener">Submit Feedback</a>
      <a class="btn secondary" href="PASTE_COMMITMENT_FORM_LINK_HERE" target="_blank" rel="noopener">Leadership Commitment</a>

      <div class="divider"></div>

      <div class="note">
        Note: Some links may require VASA sign-in.
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Director+ 2026 | Digital Hub</title>
  <style>
    :root { --bg:#ffffff; --text:#2c2c2c; --muted:#5a5a5a; --btn:#b81c2e; --btnText:#ffffff; --card:#f5f5f5; --border:#e1e1e1; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 520px; margin: 0 auto; padding: 40px 18px 56px; }
    .top { text-align:center; margin-bottom: 28px; }
    .kicker { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--btn); font-weight: 700; }
    h1 { margin: 10px 0 6px; font-size: 28px; color: var(--text); }
    .sub { margin: 0; color: var(--muted); font-size: 14px; }
    .card { background: var(--card); border-radius: 14px; padding: 16px; margin-top: 22px; border: 1px solid var(--border); }
    .btn { display:block; width:100%; box-sizing:border-box; padding: 14px 16px; margin: 12px 0; border-radius: 12px;
           background: var(--btn); color: var(--btnText); text-decoration:none; font-weight: 700; text-align:center; }
    .btn.secondary { background:#ffffff; color: var(--text); border: 1px solid var(--border); }
    .note { font-size: 12px; color: var(--muted); line-height: 1.4; margin-top: 14px; text-align:center; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="kicker">VASA Fitness</div>
      <h1>Director+ 2026</h1>
      <p class="sub">Digital Hub</p>
    </div>
    <div class="card">
      <a class="btn" href="https://vasafitness-my.sharepoint.com/:b:/p/chris_griebe/IQCbFUhWfpJqRowO90Mh0UtdAWROHoliSWFntJH0Yv1btDE?e=Z17fi2" target="_blank" rel="noopener">View Agenda</a>
      <a class="btn" href="https://vasafitness-my.sharepoint.com/:f:/p/chris_griebe/IgA-mklJ3T3USrH5TCUkQrt6AbVNWIXbkO67LgwVoI5_fCU?e=HyJgcD" target="_blank" rel="noopener">Session Materials</a>
      <a class="btn secondary" href="https://forms.office.com/Pages/DesignPageV2.aspx?origin=NeoPortalPage&subpage=design&id=NZ2boKbxi0yBAopEuVBAYgD0tGpK30hDjIZjr_8tvBVUNVBDWEtVMUZDQkhRNUNMQlNVV1lHVFJWQy4u" target="_blank" rel="noopener">Share Your Event Photos</a>
      <div class="divider"></div>
      <div class="note">
        Note: Some links may require VASA sign-in.
      </div>
    </div>
  </div>
</body>
</html>
